<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ссылка устарела — Коротко</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --coral: #FF6B6B;
      --sky: #4ECDC4;
      --yellow: #FFE66D;
      --bg: #FFF8F3;
      --white: #FFFFFF;
      --text: #2D2D2D;
      --text-soft: #7A7A7A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 24px;
    }

    /* Blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.2;
      pointer-events: none;
    }
    .b1 { width: 450px; height: 450px; background: #FF6B6B; top: -160px; right: -120px; }
    .b2 { width: 350px; height: 350px; background: #4ECDC4; bottom: -120px; left: -80px; }

    /* Hourglass animation */
    .hourglass-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }

    .hourglass-bg {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 32px;
      box-shadow: 0 12px 40px rgba(255,107,107,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 12px 40px rgba(255,107,107,0.18); }
      50% { transform: scale(1.06); box-shadow: 0 18px 50px rgba(255,107,107,0.28); }
    }

    .badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--coral);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(255,107,107,0.4);
      animation: badgePop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) 0.3s both;
    }

    @keyframes badgePop {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Card */
    .card {
      background: white;
      border-radius: 32px;
      box-shadow: 0 8px 40px rgba(255,107,107,0.1);
      padding: 48px 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 32px;
      margin-bottom: 14px;
      line-height: 1.15;
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-soft);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* Expired info box */
    .info-box {
      background: #FFF5F5;
      border: 2px solid #FFE0E0;
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 32px;
      display: none;
    }

    .info-box.visible { display: block; }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .info-label {
      font-size: 13px;
      color: var(--text-soft);
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
    }

    .info-value {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: var(--coral);
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-home {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 16px;
      padding: 16px 32px;
      background: var(--coral);
      color: white;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: transform 0.12s, box-shadow 0.15s, background 0.15s;
      box-shadow: 0 4px 16px rgba(255,107,107,0.35);
    }

    .btn-home:hover { background: #E85555; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,107,0.4); }

    .btn-new {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 24px;
      background: transparent;
      color: var(--text-soft);
      border: 2px solid #EDE8E3;
      border-radius: 18px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: all 0.15s;
    }

    .btn-new:hover { border-color: var(--sky); color: var(--sky); }

    /* Countdown sand particles */
    .sand {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .grain {
      width: 8px;
      height: 8px;
      background: var(--coral);
      border-radius: 50%;
      opacity: 0.3;
      animation: grain 1.4s ease-in-out infinite;
    }

    .grain:nth-child(2) { animation-delay: 0.2s; }
    .grain:nth-child(3) { animation-delay: 0.4s; }

    @keyframes grain {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    @media (max-width: 480px) {
      .card { padding: 36px 28px 32px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="card">
  <div class="hourglass-wrap" style="margin:0 auto 28px;">
    <div class="hourglass-bg">⏳</div>
    <div class="badge">Истекла</div>
  </div>

  <h1>Ссылка больше<br>не работает</h1>

  <p class="subtitle">
    К сожалению, срок действия этой ссылки истёк.<br>
    Возможно, её владелец установил ограничение по времени.
  </p>

  <div class="sand">
    <div class="grain"></div>
    <div class="grain"></div>
    <div class="grain"></div>
  </div>

  <div class="info-box" id="infoBox">
    <div class="info-row">
      <span class="info-label">⏰ Ссылка действовала до</span>
      <span class="info-value" id="expiredAt">—</span>
    </div>
  </div>

  <div class="actions">
    <a class="btn-home" href="/">✂️ Создать новую ссылку</a>
    <a class="btn-new" href="javascript:history.back()">← Вернуться назад</a>
  </div>
</div>

<script>
  // Read ?expired_at= param if server passes it
  const params = new URLSearchParams(location.search);
  const expAt = params.get('expired_at') || params.get('expires_at');

  if (expAt) {
    try {
      const d = new Date(expAt);
      document.getElementById('expiredAt').textContent =
        d.toLocaleString('ru-RU', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
      document.getElementById('infoBox').classList.add('visible');
    } catch {}
  }
</script>
</body>
</html>
